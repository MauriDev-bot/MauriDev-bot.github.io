<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Nube</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        .upload-box { background: #f4f4f4; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .file-list { background: #e9ecef; padding: 20px; border-radius: 8px; }
        ul { list-style-type: none; padding: 0; }
        /* Actualizamos el estilo de la lista para acomodar los botones */
        li { padding: 10px 0; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }
        .botones { display: flex; gap: 10px; }
        .btn-descargar { cursor: pointer; padding: 5px 10px; }
        .btn-eliminar { cursor: pointer; padding: 5px 10px; color: white; background-color: #dc3545; border: none; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>☁️ Mi Nube</h1>

    <div class="upload-box">
        <h3>Subir un nuevo archivo</h3>
        <form method="POST" enctype="multipart/form-data">
            <input type="file" name="file" required>
            <button type="submit">Subir a la nube</button>
        </form>
    </div>

    <div class="file-list">
        <h3>Archivos guardados</h3>
        <ul>
            {% for file in files %}
                <li>
                    <span>📄 {{ file }}</span>
                    <div class="botones">
                        <a href="{{ url_for('descargar', nombre_archivo=file) }}">
                            <button class="btn-descargar" type="button">⬇️ Descargar</button>
                        </a>
                        
                        <form action="{{ url_for('eliminar', nombre_archivo=file) }}" method="POST" style="margin: 0;">
                            <button class="btn-eliminar" type="submit">❌ Eliminar</button>
                        </form>
                    </div>
                </li>
            {% else %}
                <li>No tienes ningún archivo guardado todavía.</li>
            {% endfor %}
        </ul>
    </div>

</body>
</html>
